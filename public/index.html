<!DOCTYPE html>
<html lang="en" class="logo-page-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Page — Phuglee</title>
  <meta name="description" content="Phuglee — Form Forge and Property Distress Analyzer under one roof.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/heat-base.css">
  <link rel="stylesheet" href="/css/heat-atmosphere.css">
  <link rel="stylesheet" href="/css/heat-components.css">
  <link rel="stylesheet" href="/css/landing.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="logo-page">
  <div class="logo-page-home-bg" aria-hidden="true">
    <div class="logo-page-photo"></div>
    <div class="logo-page-photo-grain"></div>
    <div class="logo-page-photo-wear"></div>
  </div>
  <div class="heat-field" aria-hidden="true">
    <div class="heat-glow heat-glow-a"></div>
    <div class="heat-glow heat-glow-b"></div>
    <div class="heat-grid"></div>
    <div class="heat-noise"></div>
  </div>

  <!-- Logo Page -->
  <main class="landing logo-page">
    <div class="landing-inner">
      <h1 class="landing-logo-wrap">
        <img
          src="/images/phuglee-logo.svg"
          alt="Phuglee"
          class="landing-logo"
          width="408"
          height="612"
          decoding="async"
        >
      </h1>
      <p class="landing-tagline">The #1 Distressed Lead Source for Wholesalers</p>
      <div class="landing-actions">
        <a href="/heat" class="btn-heat" id="btn-heat" role="button">
          <span class="btn-heat-label">Start Closing Deals</span>
          <span class="btn-heat-shine" aria-hidden="true"></span>
        </a>
      </div>
    </div>
  </main>

  <script src="/js/auth.js" defer></script>
</body>
</html>
