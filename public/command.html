<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phuglee — Dashboard</title>
  <meta name="description" content="Pipeline momentum — under contract, projected fundings, and total funded closings.">
  <meta property="og:title" content="Phuglee — Dashboard">
  <meta property="og:description" content="Pipeline momentum — under contract, projected fundings, and total funded closings.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/images/phuglee-logo-hd.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Phuglee — Dashboard">
  <meta name="twitter:description" content="Pipeline momentum — under contract, projected fundings, and total funded closings.">
  <script src="/js/theme.js?v=distress2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shell-bundle.css?v=12">
  <link rel="stylesheet" href="/css/command-center.css?v=14">
  <script src="/js/auth-session.js"></script>
  <script src="/js/auth-config.js"></script>
  <script src="/js/auth-guard.js"></script>
</head>
<body class="phuglee-app has-premium-bg command-page">
  <a href="#main" class="phuglee-skip-link">Skip to content</a>
  <div class="phuglee-shell-bg phuglee-shell-bg--subtle" aria-hidden="true"></div>

  <div id="distress-os-nav-mount"></div>

  <main id="main" class="command-main command-page-ready">
    <div class="command-hub">
      <section
        class="command-metrics command-metrics--pipeline"
        aria-label="Under contract, projected fundings, and total funded"
        aria-live="polite"
      >
        <div class="command-metric">
          <p class="command-metric-value command-metric-value--gold" id="command-uc-count">—</p>
          <p class="command-metric-label">under contract</p>
        </div>
        <div class="command-metric-divider" aria-hidden="true"></div>
        <div class="command-metric">
          <p class="command-metric-value" id="command-projected-funding">—</p>
          <p class="command-metric-label">projected fundings</p>
        </div>
        <div class="command-metric-divider" aria-hidden="true"></div>
        <div class="command-metric">
          <p class="command-metric-value command-metric-value--money" id="command-total-funded">—</p>
          <p class="command-metric-label">total funded</p>
        </div>
      </section>

      <p class="command-coverage-status" id="command-kpi-status" hidden>Contract stats unavailable</p>

      <section class="command-coverage-map-panel" aria-label="Coverage map">
        <p class="command-map-summary" id="command-map-summary">Loading coverage…</p>
        <div class="command-coverage-map" id="command-coverage-map">
          <p class="command-map-loading">Loading map…</p>
        </div>
        <ul class="command-map-legend" aria-label="Map legend">
          <li><span class="command-map-swatch command-map-swatch--covered" aria-hidden="true"></span> Live</li>
          <li><span class="command-map-swatch command-map-swatch--pending" aria-hidden="true"></span> Coming Soon</li>
          <li><span class="command-map-swatch command-map-swatch--blocked" aria-hidden="true"></span> Can't pull</li>
        </ul>
      </section>
    </div>
  </main>

  <div id="distress-os-footer-mount"></div>
  <script src="/js/phuglee-motion.js?v=2-route" defer></script>
  <script src="/js/phuglee-states.js?v=2-route" defer></script>
  <script src="/js/home-coverage.js?v=20" defer></script>
  <script src="/js/settings-menu.js?v=4" defer></script>
  <script src="/js/command-palette.js" defer></script>
  <script src="/js/distress-status.js" defer></script>
  <script src="/js/shell-nav.js?v=33-saas-rail" defer></script>
  <script src="/js/team-alert-banner.js?v=1" defer></script>
  <script src="/js/command-center.js?v=7" defer></script>
</body>
</html>
