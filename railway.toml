[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[env]
NODE_ENV = "production"
# Login required. Do not set PHUGLEE_AUTH_OPEN=1 unless you intentionally want open access.
PHUGLEE_AUTH_DISABLED = "0"
PHUGLEE_AUTH_OPEN = "0"

[deploy]
startCommand = "sh scripts/docker-entrypoint.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1