[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[env]
# Require account login in production (admin, etc.). Set to "1" only for temporary open staging.
PHUGLEE_AUTH_DISABLED = "0"

[deploy]
startCommand = "sh scripts/docker-entrypoint.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1