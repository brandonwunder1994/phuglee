[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[env]
NODE_ENV = "production"
# Login required. Do not set PHUGLEE_AUTH_OPEN=1 unless you intentionally want open access.
PHUGLEE_AUTH_DISABLED = "0"
PHUGLEE_AUTH_OPEN = "0"
# Self-serve signup requires PHUGLEE_INVITE_CODE (set in Railway Variables).
PHUGLEE_REGISTRATION_MODE = "invite"
# Railway 500MB volume — cap backup/audit growth (override locally if needed)
PDA_MAX_MILESTONE_BACKUPS = "2"
PDA_MAX_EPHEMERAL_BACKUPS = "4"
PDA_MAX_MANUAL_BACKUPS = "3"
PDA_GEMINI_AUDIT_MAX_AGE_DAYS = "7"

[deploy]
startCommand = "sh scripts/docker-entrypoint.sh"
# Deep check fails the deploy when Form Forge or Analyzer are down.
healthcheckPath = "/api/health/deep"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1